<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koran Player V3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #2c3e50; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .status { font-size: 12px; color: #7f8c8d; margin-bottom: 10px; min-height: 15px; }
        .arabic { font-size: 26px; color: #2ecc71; direction: rtl; margin-top: 20px; line-height: 1.6; min-height: 50px; }
        .german { font-size: 16px; color: #34495e; margin-top: 10px; line-height: 1.5; }
        audio { width: 100%; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📖 Koran Live</h2>
    <div id="status" class="status">Suren werden geladen...</div>
    
    <select id="surahSelect"></select>
    <button id="playBtn">Jetzt Abspielen</button>

    <audio id="player" controls preload="auto"></audio>

    <div id="content">
        <p class="arabic" id="arText">---</p>
        <p class="german" id="deText">Wähle eine Sure aus.</p>
    </div>
</div>

<script>
    const surahSelect = document.getElementById('surahSelect');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const arText = document.getElementById('arText');
    const deText = document.getElementById('deText');
    const player = document.getElementById('player');

    // 1. Surenliste laden
    async function loadList() {
        try {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=de');
            const data = await res.json();
            surahSelect.innerHTML = data.chapters.map(c => 
                `<option value="${c.id}">${c.id}. ${c.name_simple}</option>`
            ).join('');
            status.innerText = "Bereit zum Abspielen";
        } catch (e) {
            status.innerText = "Fehler beim Laden der Surenliste.";
        }
    }

    // 2. Abspielen & Text holen
    playBtn.addEventListener('click', async () => {
        const id = surahSelect.value;
        status.innerText = "Verbinde mit Server...";
        
        try {
            // Audio-URL von der API generieren (Reciter 7 = Alafasy)
            const audioRes = await fetch(`https://api.quran.com/api/v4/chapter_recitations/7/${id}`);
            const audioData = await audioRes.json();
            const audioUrl = audioData.audio_file.audio_url;
            
            player.src = audioUrl;
            player.load(); // Wichtig für Safari/Mobile

            // Text holen
            const textRes = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?translations=12&language=de&fields=text_uthmani`);
            const textData = await textRes.json();
            
            if(textData.verses && textData.verses[0]) {
                arText.innerText = textData.verses[0].text_uthmani;
                deText.innerText = textData.verses[0].translations[0].text.replace(/<[^>]*>?/gm, '');
                
                status.innerText = "Puffere Audio...";
                
                // Audio starten
                const playPromise = player.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        status.innerText = "Spielt ab...";
                    }).catch(error => {
                        status.innerText = "Klicke den Play-Button im Player!";
                        console.log("Autoplay verhindert");
                    });
                }
            }
        } catch (err) {
            status.innerText = "Fehler: " + err.message;
        }
    });

    loadList();
</script>

</body>
</html>
