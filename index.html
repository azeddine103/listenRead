    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #ffffff;
            --surface:   #faf7f2;
            --card:      #ffffff;
            --border:    #ede8de;
            --border2:   #d4c8a8;
            --gold:      #8a6a1f;
            --gold2:     #a07c28;
            --gold-dim:  rgba(138,106,31,0.07);
            --gold-glow: rgba(138,106,31,0.15);
            --text:      #2c2415;
            --muted:     #6a5a3a;
            --muted2:    #9e8e6a;
            --green:     #1c6b3a;
            --green2:    #24884a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 8px 40px;
            overflow-x: hidden;
        }

        /* ── Hintergrund ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(138,106,31,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 85% 95%, rgba(28,107,58,0.05)  0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(138,106,31,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Subtiles Muster */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238a6a1f' fill-opacity='0.04'%3E%3Cpath d='M30 0 L32 28 L60 30 L32 32 L30 60 L28 32 L0 30 L28 28Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.7;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .bismillah {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 32px;
            color: var(--gold);
            direction: rtl;
            letter-spacing: 0.05em;
            text-shadow:
                0 0 40px rgba(138,106,31,0.25),
                0 0 80px rgba(138,106,31,0.10);
            line-height: 1.6;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 0;
        }

        .controls-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }
        .select-wrap {
            position: relative;
            flex: 1;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted2);
            pointer-events: none;
            font-size: 12px;
        }

        select {
            width: 100%;
            padding: 11px 14px 11px 28px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            color: var(--text);
            font-family: 'Amiri', serif;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
            direction: rtl;
            appearance: none;
        }

        select:hover  { border-color: var(--border2); background: var(--surface); }
        select:focus  { border-color: var(--gold); background: var(--surface); }

        .load-btn {
            padding: 9px 14px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green2) 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(28,107,58,0.25);
        }

        .load-btn:hover   { opacity: 0.9; box-shadow: 0 4px 20px rgba(28,107,58,0.35); }
        .load-btn:active  { transform: scale(0.97); }
        .load-btn:disabled { background: var(--surface); color: var(--muted2); cursor: not-allowed; box-shadow: none; }

        /* ── Audio ── */
        .audio-wrap {
            margin-bottom: 12px;
            margin-top: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 6px 12px;
        }

        audio {
            width: 100%;
            height: 32px;
            accent-color: var(--gold);
            display: block;
        }

        /* ── Nav ── */
        .verse-nav {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: stretch;
            gap: 8px;
            margin-bottom: 16px;
        }

        .nav-btn {
            padding: 13px 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--muted);
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3px;
            letter-spacing: 0.02em;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .nav-btn-arrow {
            font-size: 22px;
            line-height: 1;
            color: var(--gold);
            opacity: 0.8;
            transition: opacity 0.2s, transform 0.2s;
        }

        .nav-btn-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted2);
            font-weight: 400;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--gold);
            background: var(--gold-dim);
            box-shadow: 0 2px 10px rgba(138,106,31,0.12);
        }

        .nav-btn:hover:not(:disabled) .nav-btn-arrow { opacity: 1; }
        #prevBtn:hover:not(:disabled) .nav-btn-arrow  { transform: translateX(2px); }
        #nextBtn:hover:not(:disabled) .nav-btn-arrow  { transform: translateX(-2px); }

        .nav-btn:active:not(:disabled) { transform: scale(0.97); }
        .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }

        .nav-info {
            text-align: center;
            background: var(--gold-dim);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            min-width: 72px;
        }

        .nav-info-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--gold);
            line-height: 1.1;
        }

        .nav-info-total {
            font-size: 11px;
            color: var(--muted2);
            letter-spacing: 0.06em;
        }

        .nav-info-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted2);
            margin-top: 1px;
        }

        /* ── Vers-Display ── */
        .verse-display {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 24px rgba(138,106,31,0.07);
        }

        /* Goldene Linie oben */
        .verse-display::before { content: none; }

        /* Ornament entfernt */
        .verse-display::after { content: none; }

        /* ── Arabischer Block ── */
        .arabic-block {
            padding: 10px 16px 14px;
            background: var(--card);
        }

        /* ── Arabische Wörter ── */
        .arabic-words {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 28px;
            color: rgba(44,36,21,0.4);
            direction: rtl;
            line-height: 2.2;
            word-spacing: 8px;
        }

        .w {
            display: inline-block;
            transition: color 0.12s, text-shadow 0.12s, transform 0.1s;
            cursor: pointer;
            border-radius: 4px;
            padding: 0 3px;
        }

        .w:hover {
            color: var(--gold2);
            transform: scale(1.07);
        }

        .w.active {
            color: #3a2800;
            text-shadow:
                0 0 20px rgba(138,106,31,0.45),
                0 0 50px rgba(138,106,31,0.2);
        }

        .w.spoken { color: rgba(44,36,21,0.5); }

        .w.playing {
            color: var(--gold2);
            text-shadow: 0 0 22px rgba(160,124,40,0.65);
            transform: scale(1.1);
        }

        /* ── Deutsche Übersetzung Block ── */
        .german-block {
            padding: 28px 36px 34px;
            background: linear-gradient(160deg, var(--surface) 0%, #e2d9c8 100%);
            border-top: 2px solid var(--border2);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .german-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .german-label::before,
        .german-label::after {
            content: '';
            display: block;
            width: 32px;
            height: 1px;
            background: var(--gold);
            opacity: 0.4;
        }

        .german {
            font-size: 22px;
            color: var(--text);
            line-height: 1.85;
            font-style: italic;
            font-weight: 300;
            max-width: 480px;
            direction: ltr;
            letter-spacing: 0.01em;
            text-align: center;
        }

        /* ── Klick-Hinweis ── */
        .click-hint {
            font-size: 10px;
            color: var(--muted2);
            margin-bottom: 14px;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.06em;
        }

        /* ── Trennlinie (nicht mehr gebraucht, aber behalten) ── */
        .divider { display: none; }
        .divider-ornament { display: none; }

        /* ── Placeholder ── */
        .placeholder {
            color: var(--muted2);
            font-style: italic;
            font-size: 16px;
            text-align: center;
            font-family: 'Amiri', serif;
            direction: rtl;
            line-height: 2;
        }

        .placeholder-icon {
            font-size: 36px;
            margin-bottom: 14px;
            opacity: 0.3;
            display: block;
        }

        /* ── Animation ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .verse-inner { width: 100%; display: flex; flex-direction: column; animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }

        /* ── Footer ── */
        .footer-info {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted2);
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.7;
            letter-spacing: 0.04em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-info .footer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-sep {
            color: var(--border2);
            font-size: 10px;
        }

        .footer-info span.highlight {
            color: var(--muted);
            font-weight: 600;
        }

        /* ── Status ── */
        .status { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 0; min-height: 0; }
        .status.error { color: #c0392b; }

        /* ── Loader ── */
        .loader {
            display: inline-block; width: 11px; height: 11px;
            border: 2px solid rgba(138,106,31,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 6px; vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    </div>

    <div class="controls">
        <div class="controls-top">
            <button class="load-btn" id="loadBtn">▶ Laden · تحميل</button>
        </div>
        <div style="display:flex; gap:8px;">
            <div class="select-wrap" style="flex:1">
                <select id="surahSelect"></select>
            </div>
            <div class="select-wrap" style="flex:1">
                <select id="reciterSelect"></select>
            </div>
        </div>
    </div>

    <div class="status" id="status"></div>

    <div class="audio-wrap">
        <audio id="player" controls></audio>
    </div>

    <div class="verse-nav">
        <button class="nav-btn" id="prevBtn" disabled>
            <span class="nav-btn-arrow">→</span>
            <span class="nav-btn-label">Zurück</span>
        </button>
        <div class="nav-info" id="navInfo">
            <span class="nav-info-num">—</span>
            <span class="nav-info-total"></span>
            <span class="nav-info-label">Vers</span>
        </div>
        <button class="nav-btn" id="nextBtn" disabled>
            <span class="nav-btn-arrow">←</span>
            <span class="nav-btn-label">Weiter</span>
        </button>
    </div>

    <div class="click-hint" id="clickHint" style="display:none; text-align:center; margin-bottom:6px;">انقر على كلمة للاستماع · Wort anklicken zum Vorlesen</div>
    <div class="verse-display" id="verseDisplay">
        <div class="placeholder">
            <span class="placeholder-icon">☽</span>
            اختر سورة وقارئاً · Sure und Rezitator wählen
        </div>
    </div>

    <div class="footer-info" id="footerInfo"></div>
</div>

<script>
    const surahSelect   = document.getElementById('surahSelect');
    const reciterSelect = document.getElementById('reciterSelect');
    const loadBtn       = document.getElementById('loadBtn');
    const statusEl      = document.getElementById('status');
    const player        = document.getElementById('player');
    const verseDisplay  = document.getElementById('verseDisplay');
    const footerInfo    = document.getElementById('footerInfo');
    const prevBtn       = document.getElementById('prevBtn');
    const nextBtn       = document.getElementById('nextBtn');
    const navInfo       = document.getElementById('navInfo');

    let verses          = [];
    let verseTimes      = [];
    let currentVerseIdx = -1;
    let currentWordIdx  = -1;
    let wordAudio       = null;
    let seekLock        = false;

    const SURAS = [
        [1,'الفاتحة','Al-Fatiha'],[2,'البقرة','Al-Baqara'],[3,'آل عمران','Al-Imran'],
        [4,'النساء',"An-Nisa'"],[5,'المائدة',"Al-Ma'ida"],[6,'الأنعام',"Al-An'am"],
        [7,'الأعراف',"Al-A'raf"],[8,'الأنفال','Al-Anfal'],[9,'التوبة','At-Tawba'],
        [10,'يونس','Yunus'],[11,'هود','Hud'],[12,'يوسف','Yusuf'],
        [13,'الرعد',"Ar-Ra'd"],[14,'إبراهيم','Ibrahim'],[15,'الحجر','Al-Hijr'],
        [16,'النحل','An-Nahl'],[17,'الإسراء','Al-Isra'],[18,'الكهف','Al-Kahf'],
        [19,'مريم','Maryam'],[20,'طه','Ta-Ha'],[21,'الأنبياء','Al-Anbiya'],
        [22,'الحج','Al-Hajj'],[23,'المؤمنون',"Al-Mu'minun"],[24,'النور','An-Nur'],
        [25,'الفرقان','Al-Furqan'],[26,'الشعراء',"Ash-Shu'ara"],[27,'النمل','An-Naml'],
        [28,'القصص','Al-Qasas'],[29,'العنكبوت','Al-Ankabut'],[30,'الروم','Ar-Rum'],
        [31,'لقمان','Luqman'],[32,'السجدة','As-Sajda'],[33,'الأحزاب','Al-Ahzab'],
        [34,'سبأ','Saba'],[35,'فاطر','Fatir'],[36,'يس','Ya-Sin'],
        [37,'الصافات','As-Saffat'],[38,'ص','Sad'],[39,'الزمر','Az-Zumar'],
        [40,'غافر','Ghafir'],[41,'فصلت','Fussilat'],[42,'الشورى','Ash-Shura'],
        [43,'الزخرف','Az-Zukhruf'],[44,'الدخان','Ad-Dukhan'],[45,'الجاثية','Al-Jathiya'],
        [46,'الأحقاف','Al-Ahqaf'],[47,'محمد','Muhammad'],[48,'الفتح','Al-Fath'],
        [49,'الحجرات','Al-Hujurat'],[50,'ق','Qaf'],[51,'الذاريات','Adh-Dhariyat'],
        [52,'الطور','At-Tur'],[53,'النجم','An-Najm'],[54,'القمر','Al-Qamar'],
        [55,'الرحمن','Ar-Rahman'],[56,'الواقعة',"Al-Waqi'a"],[57,'الحديد','Al-Hadid'],
        [58,'المجادلة','Al-Mujadila'],[59,'الحشر','Al-Hashr'],[60,'الممتحنة','Al-Mumtahana'],
        [61,'الصف','As-Saf'],[62,'الجمعة',"Al-Jumu'a"],[63,'المنافقون','Al-Munafiqun'],
        [64,'التغابن','At-Taghabun'],[65,'الطلاق','At-Talaq'],[66,'التحريم','At-Tahrim'],
        [67,'الملك','Al-Mulk'],[68,'القلم','Al-Qalam'],[69,'الحاقة','Al-Haqqa'],
        [70,'المعارج',"Al-Ma'arij"],[71,'نوح','Nuh'],[72,'الجن','Al-Jinn'],
        [73,'المزمل','Al-Muzzammil'],[74,'المدثر','Al-Muddaththir'],[75,'القيامة','Al-Qiyama'],
        [76,'الإنسان','Al-Insan'],[77,'المرسلات','Al-Mursalat'],[78,'النبأ',"An-Naba"],
        [79,'النازعات',"An-Nazi'at"],[80,'عبس','Abasa'],[81,'التكوير','At-Takwir'],
        [82,'الانفطار','Al-Infitar'],[83,'المطففين','Al-Mutaffifin'],[84,'الانشقاق','Al-Inshiqaq'],
        [85,'البروج','Al-Buruj'],[86,'الطارق','At-Tariq'],[87,'الأعلى',"Al-A'la"],
        [88,'الغاشية','Al-Ghashiya'],[89,'الفجر','Al-Fajr'],[90,'البلد','Al-Balad'],
        [91,'الشمس','Ash-Shams'],[92,'الليل','Al-Layl'],[93,'الضحى','Ad-Duha'],
        [94,'الشرح','Ash-Sharh'],[95,'التين','At-Tin'],[96,'العلق','Al-Alaq'],
        [97,'القدر','Al-Qadr'],[98,'البينة','Al-Bayyina'],[99,'الزلزلة','Az-Zalzala'],
        [100,'العاديات','Al-Adiyat'],[101,'القارعة',"Al-Qari'a"],[102,'التكاثر','At-Takathur'],
        [103,'العصر','Al-Asr'],[104,'الهمزة','Al-Humaza'],[105,'الفيل','Al-Fil'],
        [106,'قريش','Quraysh'],[107,'الماعون',"Al-Ma'un"],[108,'الكوثر','Al-Kawthar'],
        [109,'الكافرون','Al-Kafirun'],[110,'النصر','An-Nasr'],[111,'المسد','Al-Masad'],
        [112,'الإخلاص','Al-Ikhlas'],[113,'الفلق','Al-Falaq'],[114,'الناس','An-Nas'],
    ];

    const RECITERS = [
        [7,  'مشاري راشد العفاسي',           'Mishari Rashid al-Afasy'],
        [1,  'عبد الباسط عبد الصمد (مرتّل)', 'AbdulBaset AbdulSamad'],
        [2,  'عبد الباسط عبد الصمد (مجوّد)',  'AbdulBaset — Mujawwad'],
        [3,  'أبو بكر الشاطري',               'Abu Bakr al-Shatri'],
        [4,  'سعود الشريم',                   "Sa'ud ash-Shuraym"],
        [5,  'محمود خليل الحصري (مرتّل)',      'Mahmoud Khalil al-Husary'],
        [6,  'هاني الرفاعي',                   'Hani ar-Rifai'],
        [9,  'محمود خليل الحصري (مجوّد)',      'Mahmoud Khalil al-Husary (Mujawwad)'],
        [10, 'سعد الغامدي',                    'Saad al-Ghamdi'],
        [11, 'محمد صديق المنشاوي',             'Muhammad Siddiq al-Minshawi'],
        [12, 'ياسر الدوسري',                   'Yasser al-Dossari'],
        [13, 'محمد اللحيدان',                  'Muhammad al-Luhaidan'],
        [14, 'علي عبد الرحمن الحذيفي',        'Ali Abdur-Rahman al-Huthaify'],
        [15, 'وديع حمادي اليماني',             'Wadee Hammadi al-Yamani'],
    ];

    surahSelect.innerHTML = SURAS.map(([id, ar, lat]) =>
        `<option value="${id}">${ar} · ${id}. ${lat}</option>`
    ).join('');

    reciterSelect.innerHTML = RECITERS.map(([id, ar, lat]) =>
        `<option value="${id}">${ar} · ${lat}</option>`
    ).join('');

    function setStatus(msg, type = '') {
        statusEl.className = 'status' + (type ? ' ' + type : '');
        statusEl.innerHTML = msg;
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentVerseIdx <= 0);
        nextBtn.disabled = (currentVerseIdx >= verses.length - 1);
        if (verses.length > 0 && currentVerseIdx >= 0) {
            navInfo.querySelector('.nav-info-num').textContent = currentVerseIdx + 1;
            navInfo.querySelector('.nav-info-total').textContent = 'von ' + verses.length;
        }
    }

    function jumpToVerse(idx) {
        if (idx < 0 || idx >= verses.length) return;
        const wasPlaying = !player.paused;
        if (verseTimes[idx]) {
            player.currentTime = verseTimes[idx].from_ms / 1000;
        }
        renderVerse(idx);
        updateNavButtons();
        if (wasPlaying) player.play().catch(() => {});
    }

    function renderVerse(idx) {
        if (idx < 0 || idx >= verses.length) return;
        currentVerseIdx = idx;
        currentWordIdx  = -1;
        const v = verses[idx];

        const wordsHtml = v.words.map((w, i) =>
            `<span class="w" data-i="${i}" data-audio="${w.audioUrl || ''}" title="انقر للاستماع · Klicken zum Vorlesen">${w.text}</span>`
        ).join(' ');

        const rec  = RECITERS.find(r => r[0] === parseInt(reciterSelect.value));
        const recAr  = rec ? rec[1] : '';
        const recLat = rec ? rec[2] : '';
        const sura = SURAS.find(s => s[0] === parseInt(surahSelect.value));

        verseDisplay.innerHTML = `
            <div class="verse-inner">
                <div class="arabic-block">
                    <div class="arabic-words" id="arabicWords">${wordsHtml}</div>
                </div>
                <div class="german-block">
                    <div class="german">${v.german || '—'}</div>
                </div>
            </div>
        `;

        footerInfo.innerHTML = `
            <div class="footer-row">
                <span class="highlight">سورة ${sura ? sura[1] : ''}</span>
                <span class="footer-sep">·</span>
                <span>${sura ? sura[2] : ''}</span>
                <span class="footer-sep">·</span>
                <span>Vers <span class="highlight">${idx + 1}</span> von ${verses.length}</span>
            </div>
            <div class="footer-row" style="color:var(--muted2); font-size:12px;">
                🎙 <span class="highlight">${recAr}</span>
                <span class="footer-sep">·</span>
                <span>${recLat}</span>
            </div>
        `;

        updateNavButtons();

        document.querySelectorAll('#arabicWords .w').forEach(el => {
            el.addEventListener('click', () => {
                const wordIdx  = parseInt(el.dataset.i);
                const audioUrl = el.dataset.audio;

                player.pause();

                const wordData = verses[currentVerseIdx]?.words?.[wordIdx];
                if (wordData?.from_ms != null) {
                    seekLock = true;
                    player.currentTime = wordData.from_ms / 1000;
                    setTimeout(() => { seekLock = false; }, 300);
                }

                if (wordAudio) { wordAudio.pause(); wordAudio = null; }

                document.querySelectorAll('#arabicWords .w.playing').forEach(e => e.classList.remove('playing'));
                el.classList.add('playing');

                const wordFrom = wordData?.from_ms != null ? wordData.from_ms / 1000 : null;
                const wordDur  = (wordData?.from_ms != null && wordData?.to_ms != null)
                    ? (wordData.to_ms - wordData.from_ms)
                    : null;

                if (wordFrom !== null && wordDur !== null) {
                    if (wordAudio) { wordAudio.pause(); wordAudio = null; }
                    wordAudio = new Audio(player.src);

                    let stopTimer = null;

                    const stop = () => {
                        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
                        if (wordAudio) { wordAudio.pause(); wordAudio = null; }
                        el.classList.remove('playing');
                        el.classList.add('active');
                    };

                    wordAudio.addEventListener('canplay', () => {
                        wordAudio.currentTime = wordFrom;
                        wordAudio.play().catch(() => {});
                        stopTimer = setTimeout(stop, wordDur + 30);
                    }, { once: true });

                    wordAudio.onended = stop;

                } else if (audioUrl) {
                    if (wordAudio) { wordAudio.pause(); wordAudio = null; }
                    wordAudio = new Audio('https://audio.qurancdn.com/' + audioUrl);
                    wordAudio.play().catch(() => {});
                    wordAudio.onended = () => {
                        el.classList.remove('playing');
                        el.classList.add('active');
                        wordAudio = null;
                    };
                }
            });
        });
    }

    function highlightWord(wordIdx) {
        if (wordIdx === currentWordIdx) return;
        currentWordIdx = wordIdx;
        document.querySelectorAll('#arabicWords .w').forEach((el, i) => {
            el.classList.remove('active', 'spoken');
            if (i < wordIdx)        el.classList.add('spoken');
            else if (i === wordIdx) el.classList.add('active');
        });
    }

    function findVerseIdx(ms) {
        if (!verseTimes.length) return 0;
        let lo = 0, hi = verseTimes.length - 1, result = 0;
        while (lo <= hi) {
            const mid = (lo + hi) >> 1;
            if (verseTimes[mid].from_ms <= ms) { result = mid; lo = mid + 1; }
            else hi = mid - 1;
        }
        return result;
    }

    function findWordIdx(vi, ms) {
        const words = verses[vi]?.words;
        if (!words?.length) return 0;
        let result = 0;
        for (let i = 0; i < words.length; i++) {
            if (words[i].from_ms !== null && ms >= words[i].from_ms) result = i;
            else if (words[i].from_ms !== null) break;
        }
        return result;
    }

    loadBtn.onclick = async () => {
        const surahId   = parseInt(surahSelect.value);
        const reciterId = parseInt(reciterSelect.value);
        if (!surahId || !reciterId) return;

        loadBtn.disabled = true;
        verses = []; verseTimes = []; currentVerseIdx = -1; currentWordIdx = -1;
        if (wordAudio) { wordAudio.pause(); wordAudio = null; }

        verseDisplay.innerHTML = '<div class="placeholder"><span class="loader"></span> جاري التحميل… · Wird geladen…</div>';
        prevBtn.disabled = true; nextBtn.disabled = true;
        navInfo.querySelector('.nav-info-num').textContent = '—';
        footerInfo.textContent = '';
        setStatus('');

        try {
            setStatus('Audio wird geladen… <span class="loader"></span>');

            // ── 1. Audio + Timestamps ──────────────────────────────────────
            const audioRes = await fetch(
                `https://api.quran.com/api/v4/chapter_recitations/${reciterId}/${surahId}?segments=true`
            );
            if (!audioRes.ok) throw new Error(`Audio-API Fehler: ${audioRes.status}`);
            const audioData = await audioRes.json();
            const audioFile = audioData.audio_file;
            if (!audioFile?.audio_url) throw new Error('Keine Audio-URL in der Antwort.');
            player.src = audioFile.audio_url;

            const rawTs = audioFile.timestamps || [];
            verseTimes = rawTs.map(t => ({
                from_ms: Number(t.timestamp_from),
                to_ms:   Number(t.timestamp_to)
            }));
            const wordSegPerVerse = rawTs.map(t => t.segments || []);

            // ── 2. Arabischer Text + Wörter ──────────────────────────────
            setStatus('Arabischer Text wird geladen… <span class="loader"></span>');
            let allVerseWords = [], page = 1;
            while (true) {
                const r = await fetch(
                    `https://api.quran.com/api/v4/verses/by_chapter/${surahId}` +
                    `?words=true&word_fields=text_uthmani,audio_url&per_page=50&page=${page}`
                );
                if (!r.ok) throw new Error(`Text-API Fehler: ${r.status}`);
                const d = await r.json();
                if (!d.verses) throw new Error('Unerwartetes API-Format.');
                allVerseWords = allVerseWords.concat(d.verses);
                if (allVerseWords.length >= d.pagination.total_records) break;
                page++;
            }

            // ── 3. Deutsche Übersetzung (Bubenheim via jsDelivr CDN) ─────
            setStatus('Deutsche Übersetzung wird geladen… <span class="loader"></span>');
            let deVerses = [];
            try {
                const transRes = await fetch(
                    `https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/deu-asfbubenheimand/${surahId}.json`
                );
                if (transRes.ok) {
                    const transData = await transRes.json();
                    // Format: { chapter: [ { verse: N, text: "..." }, ... ] }
                    deVerses = transData.chapter || [];
                }
            } catch(e) {
                console.warn('Übersetzung nicht ladbar:', e);
            }

            // ── 4. Verse zusammenbauen ────────────────────────────────────
            verses = allVerseWords.map((verse, vi) => {
                const tokens = (verse.words || []).filter(w => w.char_type_name === 'word');
                const segs = wordSegPerVerse[vi] || [];
                const segMap = {};
                segs.forEach(([wi, start, end]) => { segMap[wi] = { from_ms: start, to_ms: end }; });
                const words = tokens.map((w, wi) => {
                    const ts = segMap[wi + 1] || null;
                    return {
                        text:     w.text_uthmani || w.text,
                        audioUrl: w.audio_url || '',
                        from_ms:  ts ? ts.from_ms : null,
                        to_ms:    ts ? ts.to_ms   : null
                    };
                });
                const german = deVerses[vi]?.text || '';
                return { words, german };
            });

            setStatus('');
            document.getElementById('clickHint').style.display = 'block';
            renderVerse(0);
            updateNavButtons();

            player.play().catch(() => {
                const onCanPlay = () => {
                    player.play().catch(() => {});
                    player.removeEventListener('canplay', onCanPlay);
                };
                player.addEventListener('canplay', onCanPlay);
            });

        } catch (err) {
            const msg = err.message || 'Unbekannter Fehler';
            setStatus(`Fehler: ${msg}`, 'error');
            verseDisplay.innerHTML = `<div class="placeholder" style="padding:40px"><span class="placeholder-icon" style="opacity:.4">⚠</span>Fehler beim Laden.<br><small style="font-size:13px;color:var(--muted2)">${msg}</small></div>`;
            console.error(err);
        } finally {
            loadBtn.disabled = false;
        }
    };

    prevBtn.onclick = () => jumpToVerse(currentVerseIdx - 1);
    nextBtn.onclick = () => jumpToVerse(currentVerseIdx + 1);

    player.ontimeupdate = () => {
        if (!verses.length || !verseTimes.length || seekLock) return;
        const ms = player.currentTime * 1000;
        const vi = findVerseIdx(ms);
        if (vi !== currentVerseIdx) renderVerse(vi);
        highlightWord(findWordIdx(vi, ms));
    };
</script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
