<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koran Sync</title>
    <meta name="theme-color" content="#080b0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Koran Sync">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080b0f;
            --surface:   #0e1318;
            --card:      #131920;
            --border:    #1e2730;
            --border2:   #2a3540;
            --gold:      #c8a84b;
            --gold2:     #e8c97a;
            --gold-dim:  rgba(200,168,75,0.18);
            --gold-glow: rgba(200,168,75,0.28);
            --text:      #e8dfd0;
            --muted:     #7a8a96;
            --muted2:    #4a5a66;
            --green:     #1c6b3a;
            --green2:    #24884a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px 80px;
            overflow-x: hidden;
        }

        /* ── Hintergrund ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(200,168,75,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 85% 95%, rgba(28,107,58,0.05)  0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(200,168,75,0.02) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Subtiles Muster */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a84b' fill-opacity='0.025'%3E%3Cpath d='M30 0 L32 28 L60 30 L32 32 L30 60 L28 32 L0 30 L28 28Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.6;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .bismillah {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 32px;
            color: var(--gold);
            direction: rtl;
            letter-spacing: 0.05em;
            text-shadow:
                0 0 40px rgba(200,168,75,0.4),
                0 0 80px rgba(200,168,75,0.15);
            line-height: 1.6;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 0;
        }

        .controls-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }
        .select-wrap {
            position: relative;
            flex: 1;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            font-size: 12px;
        }

        select {
            width: 100%;
            padding: 11px 14px 11px 28px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            color: var(--text);
            font-family: 'Amiri', serif;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
            direction: rtl;
            appearance: none;
        }

        select:hover  { border-color: var(--border2); background: var(--surface); }
        select:focus  { border-color: var(--gold); background: var(--surface); }

        .load-btn {
            padding: 9px 14px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green2) 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(28,107,58,0.3);
        }

        .load-btn:hover   { opacity: 0.9; box-shadow: 0 4px 20px rgba(28,107,58,0.45); }
        .load-btn:active  { transform: scale(0.97); }
        .load-btn:disabled { background: var(--card); color: var(--muted2); cursor: not-allowed; box-shadow: none; }

        /* ── Audio ── */
        .audio-wrap {
            margin-bottom: 12px;
            margin-top: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 6px 12px;
        }

        audio {
            width: 100%;
            height: 32px;
            accent-color: var(--gold);
            display: block;
        }

        /* ── Nav ── */
        .verse-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .nav-btn {
            padding: 9px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'Amiri', serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-dim);
        }

        .nav-btn:active:not(:disabled) { transform: scale(0.97); }
        .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .nav-info {
            flex: 1;
            text-align: center;
            font-family: 'Amiri', serif;
            font-size: 15px;
            color: var(--gold);
            opacity: 0.7;
            letter-spacing: 0.05em;
        }

        /* ── Vers-Display ── */
        .verse-display {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 36px 36px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Goldene Linie oben */
        .verse-display::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 55%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* Ornament-Ecken */
        .verse-display::after {
            content: '✦';
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--gold);
            opacity: 0.5;
        }

        /* ── Arabische Wörter ── */
        .arabic-words {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 32px;
            color: rgba(232,223,208,0.35);
            direction: rtl;
            line-height: 2.2;
            margin-bottom: 28px;
            word-spacing: 6px;
        }

        .w {
            display: inline-block;
            transition: color 0.12s, text-shadow 0.12s, transform 0.1s;
            cursor: pointer;
            border-radius: 4px;
            padding: 0 3px;
        }

        .w:hover {
            color: var(--gold2);
            transform: scale(1.07);
        }

        .w.active {
            color: #fff;
            text-shadow:
                0 0 20px rgba(200,168,75,0.75),
                0 0 50px rgba(200,168,75,0.3);
        }

        .w.spoken { color: rgba(232,223,208,0.55); }

        .w.playing {
            color: var(--gold2);
            text-shadow: 0 0 22px rgba(232,201,122,0.85);
            transform: scale(1.1);
        }

        /* ── Trennlinie ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            margin: 0 auto 22px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border2));
        }

        .divider::after {
            background: linear-gradient(90deg, var(--border2), transparent);
        }

        .divider-ornament {
            color: var(--gold);
            font-size: 10px;
            opacity: 0.5;
        }

        /* ── Deutsche Übersetzung ── */
        .german {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.8;
            font-style: italic;
            font-weight: 300;
            max-width: 460px;
            direction: ltr;
            letter-spacing: 0.01em;
        }

        /* ── Klick-Hinweis ── */
        .click-hint {
            font-size: 11px;
            color: var(--muted2);
            margin-bottom: 10px;
            font-family: 'Amiri', serif;
            letter-spacing: 0.03em;
        }

        /* ── Placeholder ── */
        .placeholder {
            color: var(--muted2);
            font-style: italic;
            font-size: 16px;
            text-align: center;
            font-family: 'Amiri', serif;
            direction: rtl;
            line-height: 2;
        }

        .placeholder-icon {
            font-size: 36px;
            margin-bottom: 14px;
            opacity: 0.2;
            display: block;
        }

        /* ── Animation ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .verse-inner { width: 100%; animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }

        /* ── Footer ── */
        .footer-info {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--muted2);
            font-family: 'Amiri', serif;
            line-height: 2;
            letter-spacing: 0.03em;
        }

        .footer-info span.highlight {
            color: var(--muted);
        }

        /* ── Status ── */
        .status { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 0; min-height: 0; }
        .status.error { color: #f85149; }

        /* ── Loader ── */
        .loader {
            display: inline-block; width: 11px; height: 11px;
            border: 2px solid rgba(200,168,75,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 6px; vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    </div>

    <div class="controls">
        <div class="controls-top">
            <button class="load-btn" id="loadBtn">▶ Laden · تحميل</button>
        </div>
        <div style="display:flex; gap:8px;">
            <div class="select-wrap" style="flex:1">
                <select id="surahSelect"></select>
            </div>
            <div class="select-wrap" style="flex:1">
                <select id="reciterSelect"></select>
            </div>
        </div>
    </div>

    <div class="status" id="status"></div>

    <div class="audio-wrap">
        <audio id="player" controls></audio>
    </div>

    <div class="verse-nav">
        <button class="nav-btn" id="prevBtn" disabled>&#8594; السابقة · Zurück</button>
        <span class="nav-info" id="navInfo">—</span>
        <button class="nav-btn" id="nextBtn" disabled>Weiter · التالية &#8592;</button>
    </div>

    <div class="verse-display" id="verseDisplay">
        <div class="placeholder">
            <span class="placeholder-icon">☽</span>
            اختر سورة وقارئاً · Sure und Rezitator wählen
        </div>
    </div>

    <div class="footer-info" id="footerInfo"></div>
</div>

<script>
    const surahSelect   = document.getElementById('surahSelect');
    const reciterSelect = document.getElementById('reciterSelect');
    const loadBtn       = document.getElementById('loadBtn');
    const statusEl      = document.getElementById('status');
    const player        = document.getElementById('player');
    const verseDisplay  = document.getElementById('verseDisplay');
    const footerInfo    = document.getElementById('footerInfo');
    const prevBtn       = document.getElementById('prevBtn');
    const nextBtn       = document.getElementById('nextBtn');
    const navInfo       = document.getElementById('navInfo');

    let verses          = [];
    let verseTimes      = [];
    let currentVerseIdx = -1;
    let currentWordIdx  = -1;
    let wordAudio       = null;
    let seekLock        = false;

    const SURAS = [
        [1,'الفاتحة','Al-Fatiha'],[2,'البقرة','Al-Baqara'],[3,'آل عمران','Al-Imran'],
        [4,'النساء',"An-Nisa'"],[5,'المائدة',"Al-Ma'ida"],[6,'الأنعام',"Al-An'am"],
        [7,'الأعراف',"Al-A'raf"],[8,'الأنفال','Al-Anfal'],[9,'التوبة','At-Tawba'],
        [10,'يونس','Yunus'],[11,'هود','Hud'],[12,'يوسف','Yusuf'],
        [13,'الرعد',"Ar-Ra'd"],[14,'إبراهيم','Ibrahim'],[15,'الحجر','Al-Hijr'],
        [16,'النحل','An-Nahl'],[17,'الإسراء','Al-Isra'],[18,'الكهف','Al-Kahf'],
        [19,'مريم','Maryam'],[20,'طه','Ta-Ha'],[21,'الأنبياء','Al-Anbiya'],
        [22,'الحج','Al-Hajj'],[23,'المؤمنون',"Al-Mu'minun"],[24,'النور','An-Nur'],
        [25,'الفرقان','Al-Furqan'],[26,'الشعراء',"Ash-Shu'ara"],[27,'النمل','An-Naml'],
        [28,'القصص','Al-Qasas'],[29,'العنكبوت','Al-Ankabut'],[30,'الروم','Ar-Rum'],
        [31,'لقمان','Luqman'],[32,'السجدة','As-Sajda'],[33,'الأحزاب','Al-Ahzab'],
        [34,'سبأ','Saba'],[35,'فاطر','Fatir'],[36,'يس','Ya-Sin'],
        [37,'الصافات','As-Saffat'],[38,'ص','Sad'],[39,'الزمر','Az-Zumar'],
        [40,'غافر','Ghafir'],[41,'فصلت','Fussilat'],[42,'الشورى','Ash-Shura'],
        [43,'الزخرف','Az-Zukhruf'],[44,'الدخان','Ad-Dukhan'],[45,'الجاثية','Al-Jathiya'],
        [46,'الأحقاف','Al-Ahqaf'],[47,'محمد','Muhammad'],[48,'الفتح','Al-Fath'],
        [49,'الحجرات','Al-Hujurat'],[50,'ق','Qaf'],[51,'الذاريات','Adh-Dhariyat'],
        [52,'الطور','At-Tur'],[53,'النجم','An-Najm'],[54,'القمر','Al-Qamar'],
        [55,'الرحمن','Ar-Rahman'],[56,'الواقعة',"Al-Waqi'a"],[57,'الحديد','Al-Hadid'],
        [58,'المجادلة','Al-Mujadila'],[59,'الحشر','Al-Hashr'],[60,'الممتحنة','Al-Mumtahana'],
        [61,'الصف','As-Saf'],[62,'الجمعة',"Al-Jumu'a"],[63,'المنافقون','Al-Munafiqun'],
        [64,'التغابن','At-Taghabun'],[65,'الطلاق','At-Talaq'],[66,'التحريم','At-Tahrim'],
        [67,'الملك','Al-Mulk'],[68,'القلم','Al-Qalam'],[69,'الحاقة','Al-Haqqa'],
        [70,'المعارج',"Al-Ma'arij"],[71,'نوح','Nuh'],[72,'الجن','Al-Jinn'],
        [73,'المزمل','Al-Muzzammil'],[74,'المدثر','Al-Muddaththir'],[75,'القيامة','Al-Qiyama'],
        [76,'الإنسان','Al-Insan'],[77,'المرسلات','Al-Mursalat'],[78,'النبأ',"An-Naba"],
        [79,'النازعات',"An-Nazi'at"],[80,'عبس','Abasa'],[81,'التكوير','At-Takwir'],
        [82,'الانفطار','Al-Infitar'],[83,'المطففين','Al-Mutaffifin'],[84,'الانشقاق','Al-Inshiqaq'],
        [85,'البروج','Al-Buruj'],[86,'الطارق','At-Tariq'],[87,'الأعلى',"Al-A'la"],
        [88,'الغاشية','Al-Ghashiya'],[89,'الفجر','Al-Fajr'],[90,'البلد','Al-Balad'],
        [91,'الشمس','Ash-Shams'],[92,'الليل','Al-Layl'],[93,'الضحى','Ad-Duha'],
        [94,'الشرح','Ash-Sharh'],[95,'التين','At-Tin'],[96,'العلق','Al-Alaq'],
        [97,'القدر','Al-Qadr'],[98,'البينة','Al-Bayyina'],[99,'الزلزلة','Az-Zalzala'],
        [100,'العاديات','Al-Adiyat'],[101,'القارعة',"Al-Qari'a"],[102,'التكاثر','At-Takathur'],
        [103,'العصر','Al-Asr'],[104,'الهمزة','Al-Humaza'],[105,'الفيل','Al-Fil'],
        [106,'قريش','Quraysh'],[107,'الماعون',"Al-Ma'un"],[108,'الكوثر','Al-Kawthar'],
        [109,'الكافرون','Al-Kafirun'],[110,'النصر','An-Nasr'],[111,'المسد','Al-Masad'],
        [112,'الإخلاص','Al-Ikhlas'],[113,'الفلق','Al-Falaq'],[114,'الناس','An-Nas'],
    ];

    const RECITERS = [
        [7,  'مشاري راشد العفاسي',           'Mishari Rashid al-Afasy'],
        [1,  'عبد الباسط عبد الصمد (مرتّل)', 'AbdulBaset AbdulSamad'],
        [2,  'عبد الباسط عبد الصمد (مجوّد)',  'AbdulBaset — Mujawwad'],
        [3,  'أبو بكر الشاطري',               'Abu Bakr al-Shatri'],
        [4,  'سعود الشريم',                   "Sa'ud ash-Shuraym"],
        [5,  'محمود خليل الحصري (مرتّل)',      'Mahmoud Khalil al-Husary'],
        [6,  'هاني الرفاعي',                   'Hani ar-Rifai'],
        [9,  'محمود خليل الحصري (مجوّد)',      'Mahmoud Khalil al-Husary (Mujawwad)'],
        [10, 'سعد الغامدي',                    'Saad al-Ghamdi'],
        [11, 'محمد صديق المنشاوي',             'Muhammad Siddiq al-Minshawi'],
        [12, 'ياسر الدوسري',                   'Yasser al-Dossari'],
        [13, 'محمد اللحيدان',                  'Muhammad al-Luhaidan'],
        [14, 'علي عبد الرحمن الحذيفي',        'Ali Abdur-Rahman al-Huthaify'],
        [15, 'وديع حمادي اليماني',             'Wadee Hammadi al-Yamani'],
    ];

    surahSelect.innerHTML = SURAS.map(([id, ar, lat]) =>
        `<option value="${id}">${ar} · ${id}. ${lat}</option>`
    ).join('');

    reciterSelect.innerHTML = RECITERS.map(([id, ar, lat]) =>
        `<option value="${id}">${ar} · ${lat}</option>`
    ).join('');

    function setStatus(msg, type = '') {
        statusEl.className = 'status' + (type ? ' ' + type : '');
        statusEl.innerHTML = msg;
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentVerseIdx <= 0);
        nextBtn.disabled = (currentVerseIdx >= verses.length - 1);
        if (verses.length > 0 && currentVerseIdx >= 0) {
            navInfo.textContent = (currentVerseIdx + 1) + ' / ' + verses.length;
        }
    }

    function jumpToVerse(idx) {
        if (idx < 0 || idx >= verses.length) return;
        const wasPlaying = !player.paused;
        if (verseTimes[idx]) {
            player.currentTime = verseTimes[idx].from_ms / 1000;
        }
        renderVerse(idx);
        updateNavButtons();
        if (wasPlaying) player.play().catch(() => {});
    }

    function renderVerse(idx) {
        if (idx < 0 || idx >= verses.length) return;
        currentVerseIdx = idx;
        currentWordIdx  = -1;
        const v = verses[idx];

        const wordsHtml = v.words.map((w, i) =>
            `<span class="w" data-i="${i}" data-audio="${w.audioUrl || ''}" title="انقر للاستماع · Klicken zum Vorlesen">${w.text}</span>`
        ).join(' ');

        const rec  = RECITERS.find(r => r[0] === parseInt(reciterSelect.value));
        const recAr  = rec ? rec[1] : '';
        const recLat = rec ? rec[2] : '';
        const sura = SURAS.find(s => s[0] === parseInt(surahSelect.value));

        verseDisplay.innerHTML = `
            <div class="verse-inner">
                <div class="click-hint">انقر على كلمة للاستماع · Wort anklicken zum Vorlesen</div>
                <div class="arabic-words" id="arabicWords">${wordsHtml}</div>
                <div class="divider"><span class="divider-ornament">✦</span></div>
                <div class="german">${v.german || '—'}</div>
            </div>
        `;

        footerInfo.innerHTML = `
            <span class="highlight">سورة ${sura ? sura[1] : ''}</span> · Sure ${sura ? sura[2] : ''}
            &ensp;·&ensp;
            الآية <span class="highlight">${idx + 1}</span> من ${verses.length} · Vers ${idx + 1} von ${verses.length}
            <br>
            🎙 <span class="highlight">${recAr}</span> · ${recLat}
        `;

        updateNavButtons();

        document.querySelectorAll('#arabicWords .w').forEach(el => {
            el.addEventListener('click', () => {
                const wordIdx  = parseInt(el.dataset.i);
                const audioUrl = el.dataset.audio;

                player.pause();

                const wordData = verses[currentVerseIdx]?.words?.[wordIdx];
                if (wordData?.from_ms != null) {
                    seekLock = true;
                    player.currentTime = wordData.from_ms / 1000;
                    setTimeout(() => { seekLock = false; }, 300);
                }

                if (wordAudio) { wordAudio.pause(); wordAudio = null; }

                document.querySelectorAll('#arabicWords .w.playing').forEach(e => e.classList.remove('playing'));
                el.classList.add('playing');

                // Wort vom gewählten Rezitator abspielen:
                // Exakte Dauer per setTimeout — ontimeupdate ist zu ungenau
                const wordFrom = wordData?.from_ms != null ? wordData.from_ms / 1000 : null;
                const wordDur  = (wordData?.from_ms != null && wordData?.to_ms != null)
                    ? (wordData.to_ms - wordData.from_ms)  // ms
                    : null;

                if (wordFrom !== null && wordDur !== null) {
                    if (wordAudio) { wordAudio.pause(); wordAudio = null; }
                    wordAudio = new Audio(player.src);

                    let stopTimer = null;

                    const stop = () => {
                        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
                        if (wordAudio) { wordAudio.pause(); wordAudio = null; }
                        el.classList.remove('playing');
                        el.classList.add('active');
                    };

                    wordAudio.addEventListener('canplay', () => {
                        wordAudio.currentTime = wordFrom;
                        wordAudio.play().catch(() => {});
                        // Stopp nach exakter Wort-Dauer (+ 30ms Puffer für sauberes Ende)
                        stopTimer = setTimeout(stop, wordDur + 30);
                    }, { once: true });

                    wordAudio.onended = stop;

                } else if (audioUrl) {
                    // Fallback: generische Wort-Audio-URL (Afasy)
                    if (wordAudio) { wordAudio.pause(); wordAudio = null; }
                    wordAudio = new Audio('https://audio.qurancdn.com/' + audioUrl);
                    wordAudio.play().catch(() => {});
                    wordAudio.onended = () => {
                        el.classList.remove('playing');
                        el.classList.add('active');
                        wordAudio = null;
                    };
                }
            });
        });
    }

    function highlightWord(wordIdx) {
        if (wordIdx === currentWordIdx) return;
        currentWordIdx = wordIdx;
        document.querySelectorAll('#arabicWords .w').forEach((el, i) => {
            el.classList.remove('active', 'spoken');
            if (i < wordIdx)        el.classList.add('spoken');
            else if (i === wordIdx) el.classList.add('active');
        });
    }

    function findVerseIdx(ms) {
        if (!verseTimes.length) return 0;
        let lo = 0, hi = verseTimes.length - 1, result = 0;
        while (lo <= hi) {
            const mid = (lo + hi) >> 1;
            if (verseTimes[mid].from_ms <= ms) { result = mid; lo = mid + 1; }
            else hi = mid - 1;
        }
        return result;
    }

    function findWordIdx(vi, ms) {
        const words = verses[vi]?.words;
        if (!words?.length) return 0;
        let result = 0;
        for (let i = 0; i < words.length; i++) {
            if (words[i].from_ms !== null && ms >= words[i].from_ms) result = i;
            else if (words[i].from_ms !== null) break;
        }
        return result;
    }

    loadBtn.onclick = async () => {
        const surahId   = parseInt(surahSelect.value);
        const reciterId = parseInt(reciterSelect.value);
        if (!surahId || !reciterId) return;

        loadBtn.disabled = true;
        verses = []; verseTimes = []; currentVerseIdx = -1; currentWordIdx = -1;
        if (wordAudio) { wordAudio.pause(); wordAudio = null; }

        verseDisplay.innerHTML = '<div class="placeholder"><span class="loader"></span> جاري التحميل… · Wird geladen…</div>';
        prevBtn.disabled = true; nextBtn.disabled = true; navInfo.textContent = '—';
        footerInfo.textContent = '';
        setStatus('');

        try {
            const audioRes = await fetch(
                `https://api.quran.com/api/v4/chapter_recitations/${reciterId}/${surahId}?segments=true`
            );
            if (!audioRes.ok) throw new Error(`Audio API: ${audioRes.status}`);
            const audioData = await audioRes.json();
            const audioFile = audioData.audio_file;
            player.src = audioFile.audio_url;

            const rawTs = audioFile.timestamps || [];
            verseTimes = rawTs.map(t => ({
                from_ms: Number(t.timestamp_from),
                to_ms:   Number(t.timestamp_to)
            }));
            const wordSegPerVerse = rawTs.map(t => t.segments || []);

            let allVerseWords = [], page = 1;
            while (true) {
                const r = await fetch(
                    `https://api.quran.com/api/v4/verses/by_chapter/${surahId}` +
                    `?words=true&word_fields=text_uthmani,audio_url&per_page=50&page=${page}`
                );
                const d = await r.json();
                allVerseWords = allVerseWords.concat(d.verses);
                if (allVerseWords.length >= d.pagination.total_records) break;
                page++;
            }

            const textRes  = await fetch(
                `https://api.alquran.cloud/v1/surah/${surahId}/editions/de.bubenheim`
            );
            const textData = await textRes.json();
            const deAyahs  = textData.data[0]?.ayahs || [];

            verses = allVerseWords.map((verse, vi) => {
                const tokens = (verse.words || []).filter(w => w.char_type_name === 'word');
                const segs = wordSegPerVerse[vi] || [];
                const segMap = {};
                segs.forEach(([wi, start, end]) => { segMap[wi] = { from_ms: start, to_ms: end }; });
                const words = tokens.map((w, wi) => {
                    const ts = segMap[wi + 1] || null;
                    return {
                        text:     w.text_uthmani || w.text,
                        audioUrl: w.audio_url || '',
                        from_ms:  ts ? ts.from_ms : null,
                        to_ms:    ts ? ts.to_ms   : null
                    };
                });
                return { words, german: deAyahs[vi]?.text || '' };
            });

            renderVerse(0);
            updateNavButtons();

            player.play().catch(() => {
                const onCanPlay = () => {
                    player.play().catch(() => {});
                    player.removeEventListener('canplay', onCanPlay);
                };
                player.addEventListener('canplay', onCanPlay);
            });

        } catch (err) {
            setStatus('خطأ · Fehler beim Laden. Bitte erneut versuchen.', 'error');
            verseDisplay.innerHTML = '<div class="placeholder">خطأ · Fehler. Bitte erneut versuchen.</div>';
            console.error(err);
        } finally {
            loadBtn.disabled = false;
        }
    };

    prevBtn.onclick = () => jumpToVerse(currentVerseIdx - 1);
    nextBtn.onclick = () => jumpToVerse(currentVerseIdx + 1);

    player.ontimeupdate = () => {
        if (!verses.length || !verseTimes.length || seekLock) return;
        const ms = player.currentTime * 1000;
        const vi = findVerseIdx(ms);
        if (vi !== currentVerseIdx) renderVerse(vi);
        highlightWord(findWordIdx(vi, ms));
    };
</script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
